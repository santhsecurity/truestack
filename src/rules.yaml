rules:
  - name: "nginx"
    version_header: "server"
    category: "server"
    signals:
      - type: "header"
        key: "server"
        value: "nginx"
  - name: "Apache"
    version_header: "server"
    category: "server"
    signals:
      - type: "header"
        key: "server"
        value: "apache"
  - name: "IIS"
    version_header: "server"
    category: "server"
    signals:
      - type: "header"
        key: "server"
        value: "microsoft-iis"
  - name: "Express"
    version_header: "x-powered-by"
    category: "framework"
    signals:
      - type: "header"
        key: "x-powered-by"
        value: "express"
      - type: "cookie"
        value: "connect.sid"
      - type: "cookie"
        value: "express:sess"
  - name: "Django"
    category: "framework"
    signals:
      - type: "cookie"
        value: "csrftoken"
      - type: "cookie"
        value: "sessionid"
      - type: "cookie"
        value: "django"
      - type: "body"
        value: "csrfmiddlewaretoken"
      - type: "header"
        key: "set-cookie"
        value: "django_language"
  - name: "Ruby on Rails"
    category: "framework"
    signals:
      - type: "cookie"
        value: "_session_id"
      - type: "cookie"
        value: "_rails_session"
      - type: "header"
        key: "server"
        value: "mod_rails"
      - type: "header"
        key: "x-powered-by"
        value: "phusion passenger"
      - type: "header"
        key: "x-runtime"
        value: ""
      - type: "body"
        value: "csrf-param"
      - type: "body"
        value: "csrf-token"
  - name: "Cloudflare"
    category: "cdn"
    signals:
      - type: "header"
        key: "server"
        value: "cloudflare"
      - type: "header"
        key: "cf-ray"
        value: ""
  - name: "Fastly"
    category: "cdn"
    signals:
      - type: "header"
        key: "x-served-by"
        value: "cache"
      - type: "header"
        key: "fastly-restarts"
        value: ""
  - name: "WordPress"
    category: "cms"
    signals:
      - type: "body"
        value: "/wp-content/"
      - type: "body"
        value: "/wp-includes/"
      - type: "cookie"
        value: "wordpress_"
  - name: "Drupal"
    category: "cms"
    signals:
      - type: "header"
        key: "x-generator"
        value: "drupal"
      - type: "header"
        key: "x-drupal-cache"
        value: ""
      - type: "body"
        value: "sites/all/themes/"
      - type: "body"
        value: "sites/default/files/"
  - name: "Next.js"
    category: "framework"
    signals:
      - type: "header"
        key: "x-powered-by"
        value: "next.js"
      - type: "body"
        value: "__NEXT_DATA__"
      - type: "body"
        value: "/_next/static"
  - name: "Nuxt.js"
    category: "framework"
    signals:
      - type: "header"
        key: "x-powered-by"
        value: "nuxt"
      - type: "body"
        value: "__NUXT__"
      - type: "body"
        value: "/_nuxt/"
      - type: "body"
        value: "id=\"__nuxt\""
      - type: "body"
        value: "__NUXT_DATA__"
  - name: "React"
    category: "framework"
    signals:
      - type: "body"
        value: "react-dom"
      - type: "body"
        value: "__react"
      - type: "body"
        value: "data-reactroot"
  - name: "Vue.js"
    category: "framework"
    signals:
      - type: "body"
        value: "data-v-"
      - type: "body"
        value: "__VUE__"
  - name: "Angular"
    category: "framework"
    signals:
      - type: "body"
        value: "ng-version"
      - type: "body"
        value: "ng-app"
      - type: "body"
        value: "ng-content"
  - name: "Laravel"
    category: "framework"
    signals:
      - type: "cookie"
        value: "laravel_session"
      - type: "header"
        key: "x-powered-by"
        value: "laravel"
  - name: "PHP"
    version_header: "x-powered-by"
    category: "language"
    signals:
      - type: "header"
        key: "x-powered-by"
        value: "php"
      - type: "cookie"
        value: "PHPSESSID"
  - name: "Spring"
    category: "framework"
    signals:
      - type: "header"
        key: "x-application-context"
        value: ""
      - type: "cookie"
        value: "JSESSIONID"
  - name: "jQuery"
    category: "framework"
    signals:
      - type: "body"
        value: "jquery"
  - name: "ASP.NET"
    version_header: "x-aspnet-version"
    category: "framework"
    signals:
      - type: "header"
        key: "x-powered-by"
        value: "asp.net"
      - type: "header"
        key: "x-aspnet-version"
        value: ""
      - type: "cookie"
        value: "ASP.NET_SessionId"
